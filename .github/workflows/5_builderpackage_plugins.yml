# 📝 Based on: `5_builderprecompiled_base-dev-environment.yml`
#
# 📦 Manual Build Workflow for Wazuh Dashboard Plugins
#
# ⚡ Overview:
# This workflow builds and tests production-ready packages for Wazuh Dashboard plugins,
# either manually or triggered by other workflows.
#
# 🚀 Key Features:
# - 🖇️ Manual or Automated Builds: Supports manual execution or invocation from other workflows,
#   specifying any valid code reference (branch, tag, or commit SHA).
# - 🏗️ Production-Ready Package Generation: Builds a production-ready package from the provided code reference.
# - 🌐 Reusable Build Environment: Reuses a preconfigured build environment, ensuring consistency and easier maintenance.
# - 🧪 Automated Testing: Automatically downloads and tests generated artifacts using a dynamically configured Docker environment.
#

name: (5.x) Build app package (on demand)

on:
  workflow_call:
    inputs:
      reference:
        required: true
        type: string
        default: 5.0.0
        description: Source code reference (branch, tag or commit SHA)
  workflow_dispatch:
    inputs:
      reference:
        required: true
        type: string
        default: 5.0.0
        description: Source code reference (branch, tag or commit SHA)

env:
  CI_DEV_INTERNAL_BUCKET: s3://xdrsiem-ci-dev-internal
  CI_ARTIFACTS_REPO: wazuh-dashboard-plugins
  CI_BASE_WORKFLOW: 5_builderprecompiled_base-dev-environment
  CI_ARTIFACTS_WORKFLOW: 5_builderpackage_plugins
  CI_PLUGINS: 'main wazuh-core wazuh-check-updates'

jobs:
  # Build an app package from the given source code reference.
  build:
    name: Build app package
    uses: ./.github/workflows/5_builderprecompiled_base-dev-environment.yml
    permissions:
      pull-requests: write
    with:
      reference: ${{ inputs.reference }}
      command: 'yarn build'
      artifact_name: 'wazuh-dashboard-plugins'
    secrets: inherit

  test-packages:
    needs: build
    name: Test packages and upload artifacts to S3
    runs-on: codebuild-github-actions-codebuild-runner-dashboard-amd-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Download the plugin's source code
        uses: actions/checkout@v4
        with:
          repository: wazuh/wazuh-dashboard-plugins
          ref: ${{ inputs.reference }}
          path: wazuh

      - name: Set variables
        run: |
          echo "githubReference=$(echo ${{ inputs.reference }} | sed 's/\//-/g')" >> $GITHUB_ENV
          echo "currentDir=$(pwd -P)" >> $GITHUB_ENV
          echo "version=$(jq -r '.version' $(pwd)/wazuh/plugins/main/package.json)" >> $GITHUB_ENV
          echo "revision=$(jq -r '.revision' $(pwd)/wazuh/plugins/main/package.json)" >> $GITHUB_ENV
          echo "versionPlatform=$(jq -r '.pluginPlatform.version' $(pwd)/wazuh/plugins/main/package.json)" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_QA_AUTOMATION_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download plugin artifacts from S3
        run: |
          plugins_dir="${{ env.currentDir }}/wazuh/scripts/test-packages/plugins"
          mkdir -p "${plugins_dir}"
          for plugin in ${{ env.CI_PLUGINS }}; do
            aws s3 cp \
              "${{ env.CI_DEV_INTERNAL_BUCKET }}/${{ env.CI_ARTIFACTS_REPO }}/${{ env.CI_BASE_WORKFLOW }}/${plugin}_${{ github.run_id }}.zip" \
              "${plugins_dir}/${plugin}_${{ github.run_id }}.zip"
          done

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build the Docker image
        run: |
          cd ./wazuh/scripts/test-packages
          docker build --build-arg OSD_VERSION=${{ env.versionPlatform }} -f osd-test-packages.Dockerfile ./

      - name: Bundle plugin artifacts and upload to S3
        run: |
          plugins_dir="${{ env.currentDir }}/wazuh/scripts/test-packages/plugins"
          final_zip="artifacts_${{ github.run_id }}.zip"
          pushd "${plugins_dir}"
          zip -r "${GITHUB_WORKSPACE}/${final_zip}" .
          popd
          aws s3 cp "${GITHUB_WORKSPACE}/${final_zip}" \
            "${{ env.CI_DEV_INTERNAL_BUCKET }}/${{ env.CI_ARTIFACTS_REPO }}/${{ env.CI_ARTIFACTS_WORKFLOW }}/${final_zip}"
          echo "::notice::Bundle uploaded to ${{ env.CI_DEV_INTERNAL_BUCKET }}/${{ env.CI_ARTIFACTS_REPO }}/${{ env.CI_ARTIFACTS_WORKFLOW }}/${final_zip}"

      - name: Clean up staging artifacts
        if: always()
        run: |
          plugins_dir="${{ env.currentDir }}/wazuh/scripts/test-packages/plugins"
          for plugin in ${{ env.CI_PLUGINS }}; do
            aws s3 rm \
              "${{ env.CI_DEV_INTERNAL_BUCKET }}/${{ env.CI_ARTIFACTS_REPO }}/${{ env.CI_BASE_WORKFLOW }}/${plugin}_${{ github.run_id }}.zip" \
              || true
          done
          rm -rf "${plugins_dir}"
